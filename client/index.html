  <style>
    :root {
      box-sizing: border-box;
    }

    *,
    *::before,
    *::after {
      box-sizing: inherit;
    }

    * {
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100%;
      background-color: #ffffff;
    }

    .loading-screen {
      width: 100%;
      padding: 0 1.5rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background-color: #ffffff;
      background-image: radial-gradient(circle at 50% 35%, rgba(102, 126, 234, 0.06) 0%, transparent 60%);
    }

    .no-script {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .no-script img {
      width: 100%;
      max-width: 320px;
    }

    .no-script p {
      font-size: 1.5rem;
      font-family: 'Inter', sans-serif;
      color: #475569;
      text-align: center;
      margin-top: 3rem;
      padding: 1rem 2rem;
      background: rgba(241, 245, 249, 0.9);
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 1rem;
    }

    .custom-loader {
      transform: scale(1);
      animation: pulse 0.75s infinite;
      filter: drop-shadow(0 0 16px rgba(102, 126, 234, 0.35));
    }

    @keyframes pulse {
      0% {
        transform: scale(0.85);
      }

      70% {
        transform: scale(1.25);
      }

      100% {
        transform: scale(0.85);
      }
    }

    #root,
    #cookie-banner {
      opacity: 0;
      animation: fade-in 0.75s ease-out forwards;
    }

    @keyframes fade-in {
      100% {
        opacity: 1;
      }
    }
  </style>
